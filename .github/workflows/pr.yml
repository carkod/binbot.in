name: PR checks
on: pull_request
env:
  ACTIONS_RUNNER_DEBUG: true
  SECRET_KEY: test
  ENV: ci
  FRONTEND_DOMAIN: http://localhost

jobs:
  lint:
    name: Lint code
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm install
      - name: Run lint
        run: npm run lint
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: |
          if npm run | grep -q "test"; then npm test; else echo "No test script defined"; fi

  deploy:
    name: Build, test and deploy binbot.in
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: Load app port from .env
        run: |
          echo "NEXT_PORT=$(grep '^NEXT_PORT=' .env | cut -d= -f2 | tr -d '\"')" >> "$GITHUB_ENV"
      - name: Build image
        run: docker build --tag binbot.in .
      - name: Test app
        run: |
          docker run -d -e PORT=${NEXT_PORT} -p ${NEXT_PORT}:${NEXT_PORT} --name binbot_in binbot.in
          for i in {1..12}; do
            if curl --head --fail --silent http://localhost:${NEXT_PORT} >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker logs binbot_in
          exit 1
      - name: Tag image
        if: ${{ github.actor != 'dependabot[bot]' }}
        run: |
          docker commit binbot.in ${{ secrets.DOCKER_USERNAME }}/binbot.in &
          docker tag binbot.in ${{ secrets.DOCKER_USERNAME }}/binbot.in
      - name: Push to Docker Hub
        if: ${{ github.actor != 'dependabot[bot]' }}
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker push ${{ secrets.DOCKER_USERNAME }}/binbot.in
