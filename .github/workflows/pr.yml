
name: PR checks
on: pull_request
env:
  ACTIONS_RUNNER_DEBUG: true
  SECRET_KEY: test
  ENV: ci
  FRONTEND_DOMAIN: http://localhost

jobs:
  lint:
    name: Lint code
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm install
      - name: Run lint
        run: npm run lint
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: |
          if npm run | grep -q "test"; then npm test; else echo "No test script defined"; fi

  deploy:
    name: Build, test and deploy binbot.in
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
      - name: Build image
        run: docker build --tag binbot.in .
      - name: Test app
        run: |
          docker run -d --network host binbot.in
          sleep 5
          curl --head --fail --retry-delay 5 --retry 3 --retry-connrefused http://localhost:3000
      - name: Tag image
        if: ${{ github.actor != 'dependabot[bot]' }}
        run: |
          docker commit binbot.in ${{ secrets.DOCKER_USERNAME }}/binbot.in &
          docker tag binbot.in ${{ secrets.DOCKER_USERNAME }}/binbot.in
      - name: Push to Docker Hub
        if: ${{ github.actor != 'dependabot[bot]' }}
        run: |
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          docker push ${{ secrets.DOCKER_USERNAME }}/binbot.in
